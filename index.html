<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code 安装脚本</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 40px;
            max-width: 680px;
            width: 100%;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #f0f6fc;
        }
        .subtitle {
            color: #8b949e;
            margin-bottom: 32px;
            font-size: 15px;
        }
        .section {
            margin-bottom: 24px;
        }
        .section h2 {
            font-size: 14px;
            color: #58a6ff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        .code-block {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px 20px;
            font-family: "Cascadia Code", "Fira Code", monospace;
            font-size: 14px;
            overflow-x: auto;
            position: relative;
        }
        .code-block code {
            color: #7ee787;
        }
        .copy-btn {
            position: absolute;
            top: 8px;
            right: 12px;
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .copy-btn:hover { background: #30363d; }
        .divider {
            border: none;
            border-top: 1px solid #30363d;
            margin: 28px 0;
        }
        .footer {
            color: #8b949e;
            font-size: 13px;
        }
        .footer a { color: #58a6ff; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Claude Code 安装脚本</h1>
        <p class="subtitle">国内网络友好，一键安装 Claude Code CLI</p>

        <div class="section">
            <h2>Windows (PowerShell)</h2>
            <div class="code-block">
                <button class="copy-btn" onclick="copy(this, 'irm https://liliy959.github.io/claude-install/cc.ps1 | iex')">复制</button>
                <code>irm https://liliy959.github.io/claude-install/cc.ps1 | iex</code>
            </div>
        </div>

        <div class="section">
            <h2>macOS / Linux</h2>
            <div class="code-block">
                <button class="copy-btn" onclick="copy(this, 'curl -fsSL https://liliy959.github.io/claude-install/install.sh | bash')">复制</button>
                <code>curl -fsSL https://liliy959.github.io/claude-install/install.sh | bash</code>
            </div>
        </div>

        <hr class="divider">

        <p class="footer">
            源码托管在 <a href="https://github.com">GitHub</a> · 安装包来自
            <a href="https://github.com/anthropics/claude-code/releases">官方 Release</a>
        </p>
    </div>

    <script>
        function copy(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                btn.textContent = '已复制!';
                setTimeout(() => btn.textContent = '复制', 1500);
            });
        }
    </script>
</body>
</html>
